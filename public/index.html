<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProjectScoutIQ</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    margin: 0;
    padding: 40px 20px;
    background: #fff;
    color: #1f2937;
  }
  .wrap { max-width: 480px; margin: 0 auto; text-align: center; }
  h1 { font-size: 22px; margin-bottom: 8px; }
  p.sub { color: #6b7280; margin-bottom: 28px; }
  form { text-align: left; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; margin-top: 16px; }
  input {
    width: 100%; padding: 10px 12px; border: 1px solid #d1d5db;
    border-radius: 8px; font-size: 14px;
  }
  button {
    margin-top: 24px; width: 100%; padding: 12px; background: #2563eb;
    color: #fff; border: none; border-radius: 8px; font-size: 15px;
    font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: #2563eb;
    border-radius: 50%; margin: 0 auto 20px; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-icon { font-size: 40px; margin-bottom: 12px; }
  iframe.calculator { width: 100%; height: 80vh; border: none; border-radius: 8px; }
  .error { color: #dc2626; font-size: 13px; margin-top: 10px; display: none; }
</style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="spinner"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
